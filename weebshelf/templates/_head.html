<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
// Apply saved theme before CSS loads to prevent flash
(function(){var t=localStorage.getItem('figurya-theme');if(t)document.documentElement.setAttribute('data-theme',t)})();
</script>

<!-- SEO Meta Tags -->
<meta name="description" content="{{ meta_description | default('Search anime figurines across 15 stores at once. Compare prices, find deals, and discover figures by character, style, or vibe. Free and open-source.') }}">
<meta name="keywords" content="anime figurines, figure search, anime figures, nendoroid, scale figure, figurine price comparison, anime collectibles, anime merch, waifu figures">
<meta name="author" content="Figurya">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ canonical_url | default('https://figuryaa.onrender.com') }}">

<!-- Open Graph (Facebook, Discord, etc.) -->
<meta property="og:type" content="{{ og_type | default('website') }}">
<meta property="og:site_name" content="Figurya">
<meta property="og:title" content="{{ og_title | default('Figurya — Anime Figurine Search Engine') }}">
<meta property="og:description" content="{{ meta_description | default('Search anime figurines across 15 stores at once. Compare prices, find deals, and discover figures by character, style, or vibe.') }}">
<meta property="og:url" content="{{ canonical_url | default('https://figuryaa.onrender.com') }}">
<meta property="og:locale" content="en_US">

<!-- Favicon & Assets -->
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
