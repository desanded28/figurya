<div class="support-banner" id="supportBanner">
    <span class="support-banner-text">Figurya is free &amp; open-source. <a href="/donate">Your support</a> keeps it running.</span>
    <button class="support-banner-close" onclick="document.getElementById('supportBanner').style.display='none';sessionStorage.setItem('figurya-banner-dismissed','1')" aria-label="Dismiss">&times;</button>
</div>
<script>if(sessionStorage.getItem('figurya-banner-dismissed')==='1'){document.getElementById('supportBanner').style.display='none'}</script>
<nav class="navbar">
    <a href="/" class="nav-logo">
        <img src="/static/logo.svg" alt="Figurya" height="32">
    </a>
    <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-right" id="navRight">
        {% if stats %}
        <div class="nav-stats">
            <span class="stat-pill">{{ stats.figurines }} figures</span>
            <span class="stat-pill">{{ stats.stores|length }} stores</span>
        </div>
        {% endif %}
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="theme-icon-dark">&#9790;</span>
            <span class="theme-icon-light">&#9728;</span>
        </button>
        <a href="/donate" class="nav-link donate-link">&hearts; Donate</a>
    </div>
</nav>
