<!DOCTYPE html>
<html lang="en">
<head>
    {% include '_head.html' %}
    <title>Figurya — Page Not Found</title>
</head>
<body>
    {% include '_navbar.html' %}

    <div class="error-page">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>The figurine you're looking for isn't here. Maybe it's sold out?</p>
        <a href="/" class="error-btn">Back to search</a>
    </div>

    {% include '_footer_minimal.html' %}

    <script>
    // Mobile hamburger menu
    (function() {
        var btn = document.getElementById('navHamburger');
        var nav = document.getElementById('navRight');
        if (btn && nav) {
            btn.addEventListener('click', function() {
                btn.classList.toggle('active');
                nav.classList.toggle('open');
            });
        }
    })();
    </script>
</body>
</html>
